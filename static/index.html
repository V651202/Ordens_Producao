<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ordens de Produção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📦 Ordens de Produção</h1>

        <section class="card">
            <h2>Nova Ordem</h2>
            <form id="formOrdem">
                <div class="input-group">
                    <label for="produto">Produto</label>
                    <input type="text" id="produto" placeholder="Ex: Cadeira Gamer" required>
                </div>
                <div class="input-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" min="1" required>
                </div>
                <button type="submit">Adicionar Ordem</button>
            </form>
        </section>

        <section class="card">
            <h2>Ordens Atuais</h2>
            <table id="tabelaOrdens">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Status</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
