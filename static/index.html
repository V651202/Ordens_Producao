<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIZEN PROD | Sistema de Ordens</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div class="app-container">
        <header class="sidebar">
            <div class="logo">
                <i class='bx bxs-factory'></i>
                <span>KAIZEN<small>PROD</small></span>
            </div>
            <nav>
                <button class="nav-item active"><i class='bx bx-grid-alt'></i> Dashboard</button>
                <button class="nav-item" onclick="carregarOrdens()"><i class='bx bx-refresh'></i> Atualizar</button>
            </nav>
            <div class="status-server">
                <div class="dot"></div> Server: 10.129.224.164
            </div>
        </header>

        <main class="main-content">
            <header class="top-bar">
                <h1>Painel de Controle</h1>
                <div id="contador" class="badge-count">0 Ordens ativas</div>
            </header>

            <div class="grid-layout">
                <section class="card form-card">
                    <div class="card-header">
                        <i class='bx bx-plus-circle'></i>
                        <h2>Nova Ordem</h2>
                    </div>
                    <form id="formOrdem">
                        <div class="input-group">
                            <label>Produto</label>
                            <input type="text" id="produto" placeholder="Nome do item..." required>
                        </div>
                        <div class="input-group">
                            <label>Quantidade</label>
                            <input type="number" id="quantidade" min="1" placeholder="0" required>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span>Gerar Ordem</span>
                            <i class='bx bx-send'></i>
                        </button>
                    </form>
                </section>

                <section class="card table-card">
                    <div class="table-wrapper">
                        <table id="tabelaOrdens">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Produto</th>
                                    <th>Qtd</th>
                                    <th>Status</th>
                                    <th>Data</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                        <div id="loader" class="loader hidden">
                            <i class='bx bx-loader-alt bx-spin'></i>
                            <p>Sincronizando com a fábrica...</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
